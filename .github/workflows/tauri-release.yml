name: Build & Release Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            file

      - name: Install Windows dependencies (NSIS)
        if: matrix.os == 'windows-latest'
        run: |
          choco install nsis -y

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "GTOC Visualizer/package-lock.json"

      - name: Install frontend deps
        working-directory: "GTOC Visualizer"
        run: |
          npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GTOC Visualizer/src-tauri

      - name: Build Tauri app
        working-directory: "GTOC Visualizer"
        run: |
          npx tauri build

      - name: Collect installers
        working-directory: "GTOC Visualizer"
        run: |
          mkdir -p installers
          find src-tauri/target/release/bundle -type f \( \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" \
          \) -exec cp {} installers/ \;
          echo "=== Installers ==="
          ls -lh installers/

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Vectra-${{ matrix.os }}
          path: GTOC Visualizer/installers/*

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded files
        run: find dist -type f | head -100

      - name: Collect installer files
        run: |
          mkdir -p release
          find dist -type f \( \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" \
          \) -exec cp {} release/ \;
          echo "=== Files to release ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

